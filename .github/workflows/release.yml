name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -count=1

      - name: Build binary
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/container-compose-darwin-arm64 ./cmd/container-compose

      - name: Generate checksum
        run: |
          cd dist
          shasum -a 256 container-compose-darwin-arm64 > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/container-compose-darwin-arm64
            dist/checksums.txt
